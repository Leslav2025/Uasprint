<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA PENALTY ⚽</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b101b; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .gate { position: relative; width: 300px; height: 150px; border: 5px solid white; border-bottom: none; margin: 40px auto; background: rgba(255,255,255,0.1); display: flex; }
        .sector { flex: 1; border: 1px dashed rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .sector:hover { background: rgba(255,255,0,0.2); }
        .ball { width: 40px; height: 40px; background: white; border-radius: 50%; position: absolute; bottom: -60px; left: 130px; transition: 0.5s; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .btn-kick { background: linear-gradient(90deg, #ffd700, #ff8800); color: black; padding: 15px 30px; border-radius: 12px; font-weight: bold; border: none; margin-top: 80px; width: 100%; cursor: pointer; }
        .status { margin-top: 20px; font-size: 18px; font-weight: bold; height: 24px; }
        .bet-input { background: #151b2b; border: 1px solid #ffd700; color: white; padding: 10px; border-radius: 8px; width: 80px; text-align: center; margin: 10px; }
    </style>
</head>
<body>
    <h2>UA PENALTY ⚽</h2>
    <div class="status" id="status">Оберіть кут та бийте!</div>

    <div class="gate">
        <div class="sector" onclick="selectSector(0)" id="s0">ЛІВО</div>
        <div class="sector" onclick="selectSector(1)" id="s1">ЦЕНТР</div>
        <div class="sector" onclick="selectSector(2)" id="s2">ПРАВО</div>
        <div class="ball" id="ball">⚽</div>
    </div>

    <div>
        Ставка: <input type="number" class="bet-input" id="bet" value="1"> TON
    </div>
    <button class="btn-kick" onclick="play()">УДАРИТИ!</button>

    <script>
        let selected = -1;
        const ball = document.getElementById('ball');
        const status = document.getElementById('status');

        function selectSector(id) {
            selected = id;
            document.querySelectorAll('.sector').forEach(s => s.style.background = 'none');
            document.getElementById('s' + id).style.background = 'rgba(255,215,0,0.4)';
            status.innerText = "Кут обрано. Бийте!";
        }

        function play() {
            if (selected === -1) return alert("Оберіть кут воріт!");
            
            const bet = document.getElementById('bet').value;
            status.innerText = "Удар...";
            
            // Анімація м'яча
            const positions = ['-80px, -110px', '0px, -110px', '80px, -110px'];
            const randomGoalkeeper = Math.floor(Math.random() * 3);
            
            ball.style.transform = `translate(${positions[selected]}) scale(0.6)`;

            setTimeout(() => {
                if (selected !== randomGoalkeeper) {
                    status.innerText = `ГОООЛ! 🎉 Виграш: ${bet * 2.8} TON`;
                    status.style.color = "#4caf50";
                } else {
                    status.innerText = "ВОРОТАР ВІДБИВ! ❌";
                    status.style.color = "#ff4444";
                }
                
                // Скидання через 2 сек
                setTimeout(() => {
                    ball.style.transform = 'translate(0,0) scale(1)';
                    status.style.color = "white";
                    status.innerText = "Оберіть кут та бийте!";
                }, 2000);
            }, 500);
        }
    </script>
</body>
</html>
