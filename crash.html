<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA CRASH - РАКЕТА</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { background: #0b101b; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; overflow: hidden; }
        .main { background: linear-gradient(145deg, #151b2b, #1e263d); padding: 25px; border-radius: 24px; max-width: 380px; margin: auto; border: 1px solid #2a3454; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        
        .nav-links { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .nav-btn { color: #ffd700; text-decoration: none; font-size: 12px; font-weight: bold; border: 1px solid #ffd700; padding: 5px 10px; border-radius: 8px; }

        .game-area { height: 200px; background: rgba(0,0,0,0.4); border-radius: 16px; margin: 15px 0; position: relative; overflow: hidden; border: 2px solid #2a3454; }
        .multiplier { font-size: 50px; font-weight: 900; color: #ffd700; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; text-shadow: 0 0 20px rgba(255,215,0,0.5); }
        .rocket { position: absolute; bottom: 20px; left: 20px; font-size: 40px; display: none; }

        .balance-box { background: rgba(255,215,0,0.1); padding: 12px; border-radius: 15px; border: 1px solid #ffd700; margin-bottom: 15px; font-size: 20px; color: #ffd700; font-weight: bold; }
        
        select { background: #1a2235; color: white; border: 1px solid #2a3454; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 10px; outline: none; }
        
        #start-btn { background: linear-gradient(90deg, #ff4b2b, #ff416c); color: white; border: none; padding: 18px; width: 100%; font-weight: 900; border-radius: 16px; cursor: pointer; text-transform: uppercase; }
        #cashout-btn { background: #28a745; color: white; border: none; padding: 18px; width: 100%; font-weight: 900; border-radius: 16px; cursor: pointer; text-transform: uppercase; display: none; box-shadow: 0 5px 15px rgba(40,167,69,0.4); }
        
        .btn-deposit { background: transparent; color: #4caf50; border: 1px solid #4caf50; font-size: 10px; margin-top: 15px; padding: 8px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="main">
        <div class="nav-links">
            <a href="index.html" class="nav-btn">← НАЗАД</a>
            <a href="withdraw.html" class="nav-btn">💳 ВИВІД</a>
        </div>

        <div id="ton-connect" style="display: flex; justify-content: center; margin-bottom: 10px;"></div>
        
        <div class="balance-box"><span id="user-balance">...</span> UA</div>

        <div class="game-area">
            <div id="multiplier" class="multiplier">x1.00</div>
            <div id="rocket" class="rocket">🚀</div>
        </div>

        <select id="bet-amount">
            <option value="100">СТАВКА: 100 UA</option>
            <option value="500">СТАВКА: 500 UA</option>
            <option value="1000">СТАВКА: 1000 UA</option>
        </select>

        <button id="start-btn" onclick="startGame()">ЗАПУСТИТИ РАКЕТУ</button>
        <button id="cashout-btn" onclick="cashOut()">ЗАБРАТИ: 0 UA</button>

        <button class="btn-deposit" onclick="buyUA()">➕ КУПИТИ 5000 UA (0.01 TON)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let userName = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? (tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name) : "Гравець";
        
        let balance = 0;
        let currentMult = 1.0;
        let crashPoint = 0;
        let gameInterval;
        let isRunning = false;
        let currentBet = 0;

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/Uasprint/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        const firebaseConfig = { 
            apiKey: "AIzaSyAYt_bjoLkBBE6LRTKgvbncm_O-rM_K16o", 
            authDomain: "ualottery.firebaseapp.com", 
            projectId: "ualottery", 
            appId: "1:960757780790:web:568c021958b4ec8f0d8bd6" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function loadData() {
            const doc = await db.collection('users').doc(userName).get();
            balance = doc.exists ? (doc.data().amount || 0) : 0;
            document.getElementById('user-balance').innerText = balance.toLocaleString();
        }

        async function startGame() {
            currentBet = parseInt(document.getElementById('bet-amount').value);
            if (balance < currentBet) return tg.showAlert("Мало UA! Поповни баланс.");
            if (isRunning) return;

            // Списуємо ставку з балансу
            balance -= currentBet;
            await db.collection('users').doc(userName).set({ amount: balance }, { merge: true });
            document.getElementById('user-balance').innerText = balance.toLocaleString();

            startFlying();
        }

        function startFlying() {
            isRunning = true;
            currentMult = 1.0;
            
            // Логіка крашу
            let rnd = Math.random();
            if (rnd < 0.15) crashPoint = (1.01 + Math.random() * 0.3).toFixed(2); 
            else if (rnd < 0.8) crashPoint = (1.4 + Math.random() * 2).toFixed(2);
            else crashPoint = (3.5 + Math.random() * 10).toFixed(2);

            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('cashout-btn').style.display = 'block';
            document.getElementById('rocket').style.display = 'block';
            document.getElementById('multiplier').style.color = "#ffd700";
            
            gameInterval = setInterval(updateFrame, 100);
        }

        function updateFrame() {
            currentMult += 0.05; 
            document.getElementById('multiplier').innerText = `x${currentMult.toFixed(2)}`;
            
            let move = (currentMult - 1) * 30;
            document.getElementById('rocket').style.transform = `translate(${move}px, -${move}px)`;

            let currentWin = Math.floor(currentBet * currentMult);
            document.getElementById('cashout-btn').innerText = `ЗАБРАТИ: ${currentWin} UA`;

            if (currentMult >= crashPoint) {
                boom();
            }
        }

        function boom() {
            clearInterval(gameInterval);
            isRunning = false;
            document.getElementById('multiplier').innerText = "BOOM!";
            document.getElementById('multiplier').style.color = "#ff4b2b";
            document.getElementById('rocket').innerText = "💥";
            
            setTimeout(() => {
                document.getElementById('start-btn').style.display = 'block';
                document.getElementById('cashout-btn').style.display = 'none';
                document.getElementById('rocket').style.display = 'none';
                document.getElementById('rocket').innerText = "🚀";
                document.getElementById('multiplier').innerText = "x1.00";
            }, 2500);
        }

        async function cashOut() {
            if (!isRunning) return;
            clearInterval(gameInterval);
            isRunning = false;

            let winUA = Math.floor(currentBet * currentMult);
            balance += winUA;
            
            await db.collection('users').doc(userName).set({ amount: balance }, { merge: true });
            tg.showAlert(`💰 Успіх! Ти вивів ${winUA} UA!`);
            
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('cashout-btn').style.display = 'none';
            document.getElementById('rocket').style.display = 'none';
            loadData();
        }

        async function buyUA() {
            if (!tonConnectUI.connected) return alert("Підключи гаманець!");
            try {
                await tonConnectUI.sendTransaction({
                    validUntil: Math.floor(Date.now() / 1000) + 300,
                    messages: [{ address: "EQBrD-UZ8w2tAyxCNjO8lF4ioTwI-ELiQgF7kclC7gM2UOO_", amount: "10000000" }]
                });

                balance += 5000;
                await db.collection('users').doc(userName).set({ amount: balance }, { merge: true });
                
                // Звіт для адміна
                const statsRef = db.collection('stats').doc('global');
                db.runTransaction(async (t) => {
                    const d = await t.get(statsRef);
                    t.set(statsRef, { totalIn: (d.exists ? d.data().totalIn || 0 : 0) + 0.01 }, { merge: true });
                });

                tg.showAlert("✅ Нараховано 5000 UA!");
                loadData();
            } catch (e) { console.error(e); }
        }

        loadData();
    </script>
</body>
</html>
