<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA GOLDEN HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0b101b; --card: #151b2b; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 12px; overflow-x: hidden; }
        
        /* ВЕРХНЯ ПАНЕЛЬ */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .online-count { font-size: 10px; color: #4caf50; font-weight: bold; }
        .user-balance { background: rgba(255,215,0,0.1); border: 1px solid var(--gold); padding: 4px 12px; border-radius: 20px; color: var(--gold); font-weight: 900; }

        /* БЛОК СТАТИСТИКИ */
        .hub-stats { 
            background: var(--card); border: 1px solid rgba(255, 215, 0, 0.2); 
            border-radius: 15px; padding: 10px; display: grid; 
            grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;
        }
        .stat-item { text-align: center; }
        .stat-item:first-child { border-right: 1px solid rgba(255,215,0,0.1); }
        .stat-label { font-size: 8px; opacity: 0.6; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .stat-value { font-size: 13px; font-weight: bold; color: var(--gold); }

        /* СІТКА ІГОР (3 в ряд) */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .game-card { 
            background: var(--card); border: 1px solid rgba(255, 215, 0, 0.1); 
            border-radius: 15px; padding: 12px 5px; text-align: center; 
            text-decoration: none; color: white; transition: 0.2s;
        }
        .game-card:active { transform: scale(0.95); border-color: var(--gold); }
        .game-icon { font-size: 24px; margin-bottom: 5px; }
        .game-name { font-weight: bold; font-size: 9px; text-transform: uppercase; }

        /* БАНЕР ПАРТНЕРКИ */
        .partner-banner {
            background: linear-gradient(90deg, #1a2a4a, #151b2b);
            border: 1px solid var(--gold); border-radius: 15px; padding: 15px;
            text-decoration: none; color: white; display: flex; align-items: center; justify-content: space-between;
        }
        .partner-info h3 { margin: 0; color: var(--gold); font-size: 14px; }
        .partner-info p { margin: 3px 0 0; font-size: 10px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="online-count">● <span id="online-val">...</span> ONLINE</div>
        <div class="user-balance"><span id="user-balance">0</span> UA</div>
    </div>

    <div class="hub-stats">
        <div class="stat-item">
            <span class="stat-label">ЗАЙШЛО В ПРОЕКТ</span>
            <span class="stat-value" id="stat-ton">0.00 TON</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">ВИПЛАЧЕНО ГРАВЦЯМ</span>
            <span class="stat-value" id="stat-ua">0 UA</span>
        </div>
    </div>

    <div class="grid">
        <a href="dice.html" class="game-card"><div class="game-icon">🎲</div><div class="game-name">UA DICE</div></a>
        <a href="mines.html" class="game-card"><div class="game-icon">💣</div><div class="game-name">MINES</div></a>
        <a href="crash.html" class="game-card"><div class="game-icon">📈</div><div class="game-name">CRASH</div></a>
        <a href="penalty.html" class="game-card"><div class="game-icon">⚽</div><div class="game-name">PENALTY</div></a>
        <a href="wheel.html" class="game-card"><div class="game-icon">🎡</div><div class="game-name">WHEEL</div></a>
        <a href="lottery.html" class="game-card"><div class="game-icon">🎫</div><div class="game-name">LOTTERY</div></a>
    </div>

    <a href="partner.ntml" class="partner-banner">
        <div class="partner-info">
            <h3>ВЛАСНЕ КАЗИНО 🚀</h3>
            <p>Стань партнером та заробляй</p>
        </div>
        <div style="font-size: 24px;">💰</div>
    </a>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAYt_bjoLkBBE6LRTKgvbncm_O-rM_K16o", 
            authDomain: "ualottery.firebaseapp.com", 
            projectId: "ualottery", 
            appId: "1:960757780790:web:568c021958b4ec8f0d8bd6" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const tg = window.Telegram.WebApp;
        tg.expand();

        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : "guest";

        async function loadAllData() {
            // 1. Баланс користувача
            const userDoc = await db.collection('users').doc(userId).get();
            if (userDoc.exists) {
                document.getElementById('user-balance').innerText = userDoc.data().balance || 0;
            } else {
                await db.collection('users').doc(userId).set({ balance: 0 });
            }

            // 2. Глобальна статистика хабу
            const statsDoc = await db.collection('global_stats').doc('counters').get();
            if (statsDoc.exists) {
                const s = statsDoc.data();
                document.getElementById('stat-ton').innerText = (s.total_ton_in || 0).toFixed(2) + " TON";
                document.getElementById('stat-ua').innerText = (s.total_ua_out || 0).toLocaleString() + " UA";
            }
        }

        loadAllData();
        
        // Імітація онлайну
        document.getElementById('online-val').innerText = Math.floor(Math.random() * (220 - 110) + 110);
    </script>
</body>
</html>
