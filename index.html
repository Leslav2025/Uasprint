<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA ЛОТЕРЕЯ</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { background: #0b101b; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .main { background: #151b2b; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; border-top: 4px solid #ffd700; text-align: center; }
        .balance-box { background: #1e263d; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #2a3454; }
        #money { color: #4caf50; font-size: 32px; font-weight: bold; }
        #buy-btn { background: #ffd700; color: #000; border: none; padding: 18px; width: 100%; font-weight: bold; border-radius: 10px; cursor: pointer; text-transform: uppercase; }
        .tickets-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .ticket { background: #0057b7; height: 80px; display: flex; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 20px; border: 2px solid #004494; }
        .ticket.opened { background: #1e263d; border: 1px solid #2a3454; color: #444; }
    </style>
</head>
<body>
    <div class="main">
        <div id="ton-connect" style="display: flex; justify-content: center; margin-bottom: 15px;"></div>
        <h1 style="color: #0057b7; margin: 0;">UA ЛОТЕРЕЯ</h1>
        <div class="balance-box">
            <span>БАЛАНС:</span><br>
            <strong id="money">3800</strong> <small>UA</small>
        </div>
        <button id="buy-btn" onclick="buyWithWallet()">КУПИТИ ПАЧКУ (1000 UA)</button>
        <div id="tickets-area" class="tickets-grid"></div>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/Uasprint/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        const snd = {
            buy: new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3'),
            win: new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3'),
            scratch: new Audio('https://www.soundjay.com/buttons/sounds/button-50.mp3')
        };

        async function buyWithWallet() {
            if (!tonConnectUI.connected) return alert("Підключіть гаманець!");
            const tx = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{
                    address: "EQBrD-UZ8w2tAyxCNjO8lF4ioTwI-ELiQgF7kclC7gM2UOO_",
                    amount: "50000000",
                    payload: "te6cckEBAQEAnQAAu37S6Y0AAAAAAAAAAAAAAAAAAAC7ftLpjQAAAALpYvYf"
                }]
            };
            try {
                await tonConnectUI.sendTransaction(tx);
                snd.buy.play();
                generateTickets();
            } catch (e) { console.error(e); }
        }

        function generateTickets() {
            const area = document.getElementById('tickets-area');
            area.innerHTML = "";
            for (let i = 0; i < 10; i++) {
                const t = document.createElement('div');
                t.className = 'ticket'; t.innerText = "UA";
                t.onclick = function() {
                    if (this.classList.contains('opened')) return;
                    this.classList.add('opened');
                    snd.scratch.play();
                    this.innerText = Math.random() > 0.8 ? "+500" : "×";
                };
                area.appendChild(t);
            }
        }
    </script>
</body>
</html>
