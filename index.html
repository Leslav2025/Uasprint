<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA GOLDEN HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0b101b; --card: #151b2b; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        .header { text-align: center; padding: 20px 0; }
        .header h1 { color: var(--gold); margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        
        .game-card { 
            background: var(--card); 
            border: 1px solid rgba(255, 215, 0, 0.2); 
            border-radius: 20px; 
            padding: 20px; 
            text-align: center; 
            text-decoration: none; 
            color: white; 
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .game-card:active { transform: scale(0.95); border-color: var(--gold); }
        
        .game-icon { font-size: 40px; margin-bottom: 10px; }
        .game-name { font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .game-status { font-size: 10px; color: var(--gold); margin-top: 5px; opacity: 0.8; }

        .partner-banner {
            grid-column: span 2;
            background: linear-gradient(90deg, #1a2a4a, #151b2b);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 20px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }
        .partner-info h3 { margin: 0; color: var(--gold); font-size: 16px; }
        .partner-info p { margin: 5px 0 0; font-size: 12px; opacity: 0.8; }
        .partner-icon { font-size: 30px; }

        .footer { text-align: center; margin-top: 30px; font-size: 12px; opacity: 0.5; padding-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>UA GOLDEN HUB 🔱</h1>
    </div>

    <div class="grid">
        <a href="dice.html" class="game-card">
            <div class="game-icon">🎲</div>
            <div class="game-name">UA DICE</div>
            <div class="game-status">ONLINE</div>
        </a>

        <a href="mines.html" class="game-card">
            <div class="game-icon">💣</div>
            <div class="game-name">UA MINES</div>
            <div class="game-status">ONLINE</div>
        </a>

        <a href="crash.html" class="game-card">
            <div class="game-icon">📈</div>
            <div class="game-name">UA CRASH</div>
            <div class="game-status">ONLINE</div>
        </a>

        <a href="penalty.html" class="game-card">
            <div class="game-icon">⚽</div>
            <div class="game-name">UA PENALTY</div>
            <div class="game-status">NEW GAME</div>
        </a>

        <a href="wheel.html" class="game-card">
            <div class="game-icon">🎡</div>
            <div class="game-name">UA WHEEL</div>
            <div class="game-status">ONLINE</div>
        </a>

        <a href="lottery.html" class="game-card">
            <div class="game-icon">🎫</div>
            <div class="game-name">UA LOTTERY</div>
            <div class="game-status">COMING SOON</div>
        </a>

        <a href="partner.html" class="partner-banner">
            <div class="partner-info">
                <h3>ВЛАСНЕ КАЗИНО 🚀</h3>
                <p>Отримуй 90% від ставок гравців</p>
            </div>
            <div class="partner-icon">💰</div>
        </a>
    </div>

    <div class="footer">
        © 2026 UA GOLDEN HUB. All rights reserved.
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = '#0b101b';
        tg.headerColor = '#0b101b';
    </script>
</body>
</html>
