<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA GOLDEN HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0b101b; --card: #151b2b; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 12px; }
        
        .header-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .user-info { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: bold; color: var(--gold); }
        .user-balance { background: rgba(255,215,0,0.1); border: 1px solid var(--gold); padding: 5px 12px; border-radius: 20px; color: var(--gold); font-weight: 900; font-size: 14px; }

        .hub-stats { 
            background: var(--card); border: 1px solid rgba(255, 215, 0, 0.2); 
            border-radius: 15px; padding: 10px; display: grid; 
            grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 13px; font-weight: bold; color: var(--gold); display: block; }
        .stat-label { font-size: 8px; opacity: 0.6; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .game-card { 
            background: var(--card); border: 1px solid rgba(255, 215, 0, 0.1); 
            border-radius: 12px; padding: 10px 5px; text-align: center; text-decoration: none; color: white;
        }
        .game-icon { font-size: 22px; margin-bottom: 4px; }
        .game-name { font-weight: bold; font-size: 9px; text-transform: uppercase; }

        .leaderboard { background: var(--card); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 15px; padding: 12px; margin-bottom: 15px; }
        .leader-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
        
        .visitors { text-align: center; font-size: 10px; color: #4caf50; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header-main">
        <div class="user-info">
            <span>👤</span>
            <span id="user-name">ЗАВАНТАЖЕННЯ...</span>
        </div>
        <div class="user-balance">
            <span id="user-balance">0</span> UA
        </div>
    </div>

    <div class="hub-stats">
        <div class="stat-item" style="border-right: 1px solid rgba(255,215,0,0.1);">
            <span class="stat-value" id="stat-ton">0.00 TON</span>
            <span class="stat-label">ЗАЙШЛО В ПРОЕКТ</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="stat-ua">0 UA</span>
            <span class="stat-label">ВИПЛАЧЕНО ГРАВЦЯМ</span>
        </div>
    </div>

    <div class="grid">
        <a href="dice.html" class="game-card"><div class="game-icon">🎲</div><div class="game-name">DICE</div></a>
        <a href="mines.html" class="game-card"><div class="game-icon">💣</div><div class="game-name">MINES</div></a>
        <a href="crash.html" class="game-card"><div class="game-icon">📈</div><div class="game-name">CRASH</div></a>
        <a href="penalty.html" class="game-card"><div class="game-icon">⚽</div><div class="game-name">PENALTY</div></a>
        <a href="wheel.html" class="game-card"><div class="game-icon">🎡</div><div class="game-name">WHEEL</div></a>
        <a href="lottery.html" class="game-card"><div class="game-icon">🎫</div><div class="game-name">LOTTERY</div></a>
    </div>

    <div class="leaderboard">
        <div style="color:var(--gold); font-size:11px; font-weight:bold; margin-bottom:8px;">🏆 ТОП ГРАВЦІВ</div>
        <div id="leader-list"></div>
    </div>

    <div class="visitors">
        <span style="display:inline-block; width:6px; height:6px; background:#4caf50; border-radius:50%; margin-right:4px;"></span>
        ЗАРАЗ ГРАЮТЬ: <span id="v-count">145</span>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAYt_bjoLkBBE6LRTKgvbncm_O-rM_K16o", 
            authDomain: "ualottery.firebaseapp.com", 
            projectId: "ualottery", 
            appId: "1:960757780790:web:568c021958b4ec8f0d8bd6" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe.user;
        const userId = user ? user.id.toString() : "guest";
        const userName = user ? (user.username || user.first_name) : "GAYDER";

        document.getElementById('user-name').innerText = userName.toUpperCase();

        async function syncData() {
            try {
                // 1. Отримуємо баланс користувача
                const userRef = db.collection('users').doc(userId);
                const doc = await userRef.get();
                
                if (doc.exists) {
                    const userData = doc.data();
                    document.getElementById('user-balance').innerText = userData.balance || 0;
                } else {
                    await userRef.set({ name: userName, balance: 0, lastSeen: new Date() });
                }

                // 2. Глобальна стата (TON та UA)
                const stats = await db.collection('global_stats').doc('counters').get();
                if (stats.exists) {
                    const sData = stats.data();
                    document.getElementById('stat-ton').innerText = (sData.total_ton_in || 0).toFixed(2) + " TON";
                    document.getElementById('stat-ua').innerText = (sData.total_ua_out || 0).toLocaleString() + " UA";
                }

                // 3. Виправлений ТОП гравців (без NaN)
                const leaders = await db.collection('users').orderBy('balance', 'desc').limit(3).get();
                const lList = document.getElementById('leader-list');
                lList.innerHTML = '';
                
                let rank = 1;
                leaders.forEach((l) => {
                    const d = l.data();
                    lList.innerHTML += `
                        <div class="leader-item">
                            <span><b style="color:var(--gold)">#${rank}</b> ${d.name || 'Анонім'}</span>
                            <span style="color:var(--gold)">${d.balance || 0} UA</span>
                        </div>`;
                    rank++;
                });
            } catch (err) {
                console.error("Помилка синхронізації:", err);
            }
        }

        syncData();
        setInterval(syncData, 5000); // Оновлювати кожні 5 сек
    </script>
</body>
</html>
