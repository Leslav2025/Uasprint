<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA ЛОТЕРЕЯ - PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { background: #0b101b; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .main { background: linear-gradient(145deg, #151b2b, #1e263d); padding: 25px; border-radius: 24px; width: 100%; max-width: 380px; border: 1px solid #2a3454; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .balance-box { background: rgba(0, 0, 0, 0.3); padding: 20px; border-radius: 16px; margin: 15px 0; border: 1px dashed #ffd700; }
        #money { color: #ffd700; font-size: 36px; font-weight: 800; }
        #buy-btn { background: linear-gradient(90deg, #ffd700, #ffaa00); color: #000; border: none; padding: 18px; width: 100%; font-weight: 900; border-radius: 14px; cursor: pointer; text-transform: uppercase; font-size: 16px; transition: 0.2s; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); }
        #buy-btn:active { transform: scale(0.98); }
        .tickets-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .ticket { background: #0057b7; height: 80px; display: flex; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 20px; border-bottom: 4px solid #004494; color: white; transition: 0.1s; position: relative; overflow: hidden; }
        .ticket.opened { background: #0f1422; border: 1px solid #2a3454; color: #444; cursor: default; border-bottom: none; }
        .leaderboard { margin-top: 25px; text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 14px; font-size: 13px; border: 1px solid #2a3454; }
        .win-anim { color: #ffd700; font-size: 24px; font-weight: bold; animation: pop 0.3s; }
        @keyframes pop { 0% {transform: scale(0.5);} 100% {transform: scale(1);} }
    </style>
</head>
<body>
    <div class="main">
        <div id="ton-connect" style="display: flex; justify-content: center; margin-bottom: 15px;"></div>
        <h1 id="user-display" style="color: #fff; margin: 0; font-size: 18px; opacity: 0.8;">Завантаження...</h1>
        <div class="balance-box">
            <span style="font-size: 12px; opacity: 0.7;">МІЙ ВИГРАШ:</span><br>
            <strong id="money">...</strong> <small style="color: #ffd700;">UA</small>
        </div>
        <button id="buy-btn" onclick="buyWithWallet()">КУПИТИ ПАЧКУ (0.01 TON)</button>
        <div id="tickets-area" class="tickets-grid"></div>
        <div class="leaderboard">
            <h3 style="color: #ffd700; margin: 0 0 10px 0; font-size: 14px;">🏆 ТОП ГРАВЦІВ:</h3>
            <div id="leader-list">Оновлення лідерів...</div>
        </div>
    </div>

    <script>
        // Ініціалізація Telegram
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let userName = "Гравець";
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userName = tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name || "Гравець";
        }
        document.getElementById('user-display').innerText = "ПРИВІТ, " + userName.toUpperCase();

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/Uasprint/tonconnect-manifest.json?v=105',
            buttonRootId: 'ton-connect'
        });

        // Покращені звуки
        const sounds = {
            buy: new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3'),
            scratch: new Audio('https://www.soundjay.com/buttons/sounds/button-50.mp3'),
            win: new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3')
        };

        const firebaseConfig = { 
            apiKey: "AIzaSyAYt_bjoLkBBE6LRTKgvbncm_O-rM_K16o", 
            authDomain: "ualottery.firebaseapp.com", 
            projectId: "ualottery", 
            appId: "1:960757780790:web:568c021958b4ec8f0d8bd6" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let balance = 0;

        async function load() {
            const doc = await db.collection('users').doc(userName).get();
            balance = doc.exists ? doc.data().amount : 0;
            document.getElementById('money').innerText = balance;
            updateLeaders();
        }

        async function updateLeaders() {
            const snap = await db.collection('users').orderBy('amount', 'desc').limit(5).get();
            let html = "";
            snap.forEach(d => {
                const name = d.id;
                const amt = d.data().amount;
                html += `<div style="display:flex;justify-content:space-between;margin-bottom:5px">
                            <span>👤 ${name}</span><b>${amt} UA</b>
                         </div>`;
            });
            document.getElementById('leader-list').innerHTML = html;
        }

        async function buyWithWallet() {
            if (!tonConnectUI.connected) {
                tg.showAlert("Будь ласка, підключіть гаманець TON!");
                return;
            }
            const tx = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{
                    address: "EQBrD-UZ8w2tAyxCNjO8lF4ioTwI-ELiQgF7kclC7gM2UOO_",
                    amount: "10000000" // 0.01 TON
                }]
            };
            try {
                await tonConnectUI.sendTransaction(tx);
                sounds.buy.play().catch(() => {});
                generateTickets();
            } catch (e) {
                console.error(e);
            }
        }

        function generateTickets() {
            const area = document.getElementById('tickets-area');
            area.innerHTML = "";
            for (let i = 0; i < 10; i++) {
                const t = document.createElement('div');
                t.className = 'ticket'; t.innerText = "UA";
                t.onclick = function() {
                    if (this.classList.contains('opened')) return;
                    this.classList.add('opened');
                    
                    let win = Math.random() > 0.8 ? (Math.floor(Math.random() * 5) + 1) * 200 : 0;
                    
                    if (win > 0) { 
                        balance += win; 
                        sounds.win.play().catch(() => {});
                        this.innerHTML = `<span class="win-anim">+${win}</span>`; 
                    } else { 
                        sounds.scratch.play().catch(() => {});
                        this.innerText = "✕"; 
                    }
                    
                    document.getElementById('money').innerText = balance;
                    db.collection('users').doc(userName).set({ amount: balance }, { merge: true });
                    updateLeaders();
                };
                area.appendChild(t);
            }
        }
        load();
    </script>
</body>
</html>
