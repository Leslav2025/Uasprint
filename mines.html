<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA MINES | LIVE STATS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0b101b; --card: #151b2b; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .balance-box { background: var(--card); border: 1px solid var(--gold); padding: 10px; border-radius: 10px; margin-bottom: 10px; font-weight: bold; color: var(--gold); }
        
        /* Панель особистої статистики в грі */
        .personal-stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; margin-bottom: 20px; font-size: 11px; }
        .stat-v { color: var(--gold); display: block; font-size: 14px; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-width: 300px; margin: 0 auto; }
        .cell { width: 55px; height: 55px; background: var(--card); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border: 1px solid #333; transition: 0.2s; }
        .btn { background: var(--gold); color: black; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; margin-top: 20px; width: 100%; max-width: 300px; cursor: pointer; }
        input { background: var(--card); border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; width: 80%; margin-bottom: 10px; text-align: center; font-size: 16px; }
    </style>
</head>
<body>

    <div class="balance-box">БАЛАНС: <span id="user-balance">0</span> UA</div>
    
    <div class="personal-stats">
        <div>ІГОР ЗА СЬОГОДНІ<span id="stat-games" class="stat-v">0</span></div>
        <div>ВСЬОГО ВИГРАНО<span id="stat-total-won" class="stat-v">0</span></div>
    </div>

    <input type="number" id="bet-amount" value="100" step="10">
    <div class="grid" id="mine-grid"></div>
    <button class="btn" id="main-btn" onclick="startGame()">ПОСТАВИТИ</button>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAYt_bjoLkBBE6LRTKgvbncm_O-rM_K16o", 
            authDomain: "ualottery.firebaseapp.com", 
            projectId: "ualottery", 
            appId: "1:960757780790:web:568c021958b4ec8f0d8bd6" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const tg = window.Telegram.WebApp;

        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : "guest";
        let currentBalance = 0;
        let isGameActive = false;

        // СИНХРОНІЗАЦІЯ ДАНИХ (Баланс + Особиста стата)
        db.collection('users').doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                currentBalance = data.balance || 0;
                document.getElementById('user-balance').innerText = currentBalance.toLocaleString();
                document.getElementById('stat-games').innerText = data.total_games || 0;
                document.getElementById('stat-total-won').innerText = (data.total_won || 0).toLocaleString() + " UA";
            }
        });

        async function startGame() {
            const betAmount = parseInt(document.getElementById('bet-amount').value);
            if (betAmount > currentBalance || betAmount <= 0) return alert("Недостатньо UA!");

            // 1. Оновлюємо баланс та лічильник ігор гравця
            await db.collection('users').doc(userId).update({
                balance: firebase.firestore.FieldValue.increment(-betAmount),
                total_games: firebase.firestore.FieldValue.increment(1)
            });

            // 2. Оновлюємо загальну касу проекту для Хабу
            db.collection('global_stats').doc('counters').set({
                total_ua_in: firebase.firestore.FieldValue.increment(betAmount)
            }, { merge: true });

            isGameActive = true;
            document.getElementById('main-btn').innerText = "ЗАБРАТИ (X1.20)";
            renderGrid(betAmount);
        }

        // Функція для запису виграшу (викликати, коли гравець переміг)
        async function claimWin(winAmount) {
            await db.collection('users').doc(userId).update({
                balance: firebase.firestore.FieldValue.increment(winAmount),
                total_won: firebase.firestore.FieldValue.increment(winAmount)
            });
            isGameActive = false;
            document.getElementById('main-btn').innerText = "ПОСТАВИТИ";
            alert("Ви виграли " + winAmount + " UA!");
        }

        function renderGrid(bet) {
            const grid = document.getElementById('mine-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => { 
                    if(!isGameActive) return;
                    cell.innerHTML = '💎'; 
                    cell.style.boxShadow = "inset 0 0 10px #4caf50";
                    // Тут твоя логіка виграшу... для тесту дамо виграш через 3 кліки
                };
                grid.appendChild(cell);
            }
        }
        renderGrid();
    </script>
</body>
</html>
