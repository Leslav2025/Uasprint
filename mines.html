<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA MINES</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0b101b; --card: #151b2b; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-btn { text-decoration: none; color: var(--gold); border: 1px solid var(--gold); padding: 5px 10px; border-radius: 8px; font-size: 12px; }
        .balance-box { background: var(--card); border: 1px solid var(--gold); padding: 15px; border-radius: 12px; margin-bottom: 15px; font-size: 24px; color: var(--gold); font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 320px; margin: 0 auto; }
        .cell { width: 60px; height: 60px; background: var(--card); border-radius: 10px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; }
        .controls { margin-top: 20px; }
        .btn-deposit { background: #4caf50; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; max-width: 320px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn">⬅️ ХАБ</a>
        <div id="ton-connect-button"></div>
    </div>

    <div class="balance-box"><span id="user-balance">0</span> UA</div>

    <div class="grid" id="mine-grid"></div>

    <div class="controls">
        <button class="btn-deposit" onclick="buyUA()">⚡ ПОПОВНИТИ (0.01 TON = 5000 UA)</button>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAYt_bjoLkBBE6LRTKgvbncm_O-rM_K16o", 
            authDomain: "ualottery.firebaseapp.com", 
            projectId: "ualottery", 
            appId: "1:960757780790:web:568c021958b4ec8f0d8bd6" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const tg = window.Telegram.WebApp;

        // ПІДКЛЮЧЕННЯ TON CONNECT
        // Додай час до посилання на маніфест, щоб скинути кеш Telegram!
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://gayder.github.io/tonconnect-manifest.json?v=' + Date.now(),
            buttonRootId: 'ton-connect-button'
        });

        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : "guest";

        // Оновлення балансу
        db.collection('users').doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                document.getElementById('user-balance').innerText = (doc.data().balance || 0).toLocaleString();
            }
        });

        async function buyUA() {
            const myWallet = "UQAWV7e4o5pzIWm3PfDQr3l96epyBezSn7dPjpCJ8GwAwnh9";

            if (!tonConnectUI.connected) {
                await tonConnectUI.openModal();
                return;
            }

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{ address: myWallet, amount: "10000000" }]
            };

            try {
                const result = await tonConnectUI.sendTransaction(transaction);
                if (result) {
                    await db.collection('users').doc(userId).update({
                        balance: firebase.firestore.FieldValue.increment(5000)
                    });
                    tg.showAlert("✅ Нараховано 5000 UA!");
                }
            } catch (e) {
                console.error(e);
                tg.showAlert("Помилка транзакції.");
            }
        }

        function renderGrid() {
            const grid = document.getElementById('mine-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => { cell.innerHTML = '💎'; };
                grid.appendChild(cell);
            }
        }
        renderGrid();
    </script>
</body>
</html>
