<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA MINES | 5000 UA</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0b101b; --card: #151b2b; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-btn { text-decoration: none; color: var(--gold); font-weight: bold; font-size: 13px; padding: 7px 12px; border: 1px solid var(--gold); border-radius: 8px; text-transform: uppercase; }
        #ton-connect-button { scale: 0.8; transform-origin: right; }

        .balance-box { background: var(--card); border: 1px solid var(--gold); padding: 15px; border-radius: 12px; margin-bottom: 10px; font-weight: bold; color: var(--gold); font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        .personal-stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin-bottom: 20px; font-size: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-v { color: var(--gold); display: block; font-size: 15px; font-weight: bold; margin-top: 2px; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 320px; margin: 0 auto; }
        .cell { width: 60px; height: 60px; background: var(--card); border-radius: 10px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: 0.2s; }
        .cell:active { transform: scale(0.9); background: #1c253d; }

        .controls { margin-top: 25px; max-width: 320px; margin: 0 auto; }
        input { background: var(--card); border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; text-align: center; font-size: 18px; outline: none; }
        .btn-play { background: var(--gold); color: black; border: none; padding: 16px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; text-transform: uppercase; transition: 0.2s; }
        .btn-play:active { opacity: 0.8; }
        .btn-deposit { background: #4caf50; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; font-size: 14px; box-shadow: 0 4px 10px rgba(76,175,80,0.2); }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn">⬅️ ХАБ</a>
        <div id="ton-connect-button"></div>
    </div>

    <div class="balance-box"><span id="user-balance">0</span> UA</div>
    
    <div class="personal-stats">
        <div>ІГОР ЗА СЬОГОДНІ<span id="stat-games" class="stat-v">0</span></div>
        <div>ВСЬОГО ВИГРАНО<span id="stat-total-won" class="stat-v">0</span></div>
    </div>

    <div class="grid" id="mine-grid"></div>

    <div class="controls">
        <input type="number" id="bet-amount" value="100">
        <button class="btn-play" onclick="startGame()">ПОСТАВИТИ</button>
        <button class="btn-deposit" onclick="buyUA()">⚡ КУПИТИ 5000 UA (0.01 TON)</button>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAYt_bjoLkBBE6LRTKgvbncm_O-rM_K16o", 
            authDomain: "ualottery.firebaseapp.com", 
            projectId: "ualottery", 
            appId: "1:960757780790:web:568c021958b4ec8f0d8bd6" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const tg = window.Telegram.WebApp;
        tg.expand();

        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : "guest";

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://gayder.github.io/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        // Оновлення даних в реальному часі
        db.collection('users').doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const d = doc.data();
                document.getElementById('user-balance').innerText = (d.balance || 0).toLocaleString();
                document.getElementById('stat-games').innerText = d.total_games || 0;
                document.getElementById('stat-total-won').innerText = (d.total_won || 0).toLocaleString();
            }
        });

        async function buyUA() {
            const myWallet = "UQAWV7e4o5pzIWm3PfDQr3l96epyBezSn7dPjpCJ8GwAwnh9";

            if (!tonConnectUI.connected) {
                tg.showAlert("Спочатку підключи гаманець кнопкою зверху!");
                await tonConnectUI.openModal();
                return;
            }

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{ address: myWallet, amount: "10000000" }] // 0.01 TON
            };

            try {
                const result = await tonConnectUI.sendTransaction(transaction);
                if (result) {
                    // НАРАХУВАННЯ 5000 UA
                    await db.collection('users').doc(userId).update({
                        balance: firebase.firestore.FieldValue.increment(5000)
                    });
                    
                    // Оновлення статистики ХАБУ
                    db.collection('global_stats').doc('counters').set({
                        total_ton_in: firebase.firestore.FieldValue.increment(0.01)
                    }, {merge: true});

                    tg.showScanQrPopup({ text: "Оплата прийнята! +5000 UA" });
                    setTimeout(() => tg.closeScanQrPopup(), 2000);
                }
            } catch (e) {
                tg.showAlert("Оплата скасована.");
            }
        }

        async function startGame() {
            const bet = parseInt(document.getElementById('bet-amount').value);
            const userDoc = await db.collection('users').doc(userId).get();
            const balance = userDoc.exists ? userDoc.data().balance : 0;

            if (bet > balance || bet <= 0) return tg.showAlert("Недостатньо UA на балансі!");

            await db.collection('users').doc(userId).update({
                balance: firebase.firestore.FieldValue.increment(-bet),
                total_games: firebase.firestore.FieldValue.increment(1)
            });

            // Оновлення обороту в Хабі
            db.collection('global_stats').doc('counters').set({
                total_ua_in: firebase.firestore.FieldValue.increment(bet)
            }, {merge: true});

            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('mine-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => { cell.innerHTML = '💎'; cell.style.borderColor = '#4caf50'; };
                grid.appendChild(cell);
            }
        }
        renderGrid();
    </script>
</body>
</html>
