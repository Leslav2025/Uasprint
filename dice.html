<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA DICE - КУБИК</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #0b101b; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; min-height: 100vh; }
        .main { background: linear-gradient(145deg, #151b2b, #1e263d); padding: 25px; border-radius: 24px; width: 100%; max-width: 380px; border: 1px solid #2a3454; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); position: relative; }
        
        .back-link { position: absolute; top: 15px; left: 20px; color: #ffd700; text-decoration: none; font-size: 12px; font-weight: bold; z-index: 10; }
        .withdraw-link { position: absolute; top: 15px; right: 20px; color: #ffd700; text-decoration: none; font-size: 12px; font-weight: bold; border: 1px solid #ffd700; padding: 4px 8px; border-radius: 8px; z-index: 10; }
        
        .title-dice { font-size: 26px; font-weight: 900; margin: 30px 0 5px 0; color: #ff4b2b; }
        
        /* КУБИК */
        .dice-container { height: 120px; display: flex; justify-content: center; align-items: center; margin: 30px 0; }
        #dice { width: 80px; height: 80px; background: white; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 40px; color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.2); transition: 0.5s; }
        .roll-anim { animation: roll 0.5s infinite; }
        @keyframes roll { 0% { transform: rotate(0deg); } 25% { transform: rotate(90deg) scale(1.1); } 50% { transform: rotate(180deg); } 75% { transform: rotate(270deg) scale(1.1); } 100% { transform: rotate(360deg); } }

        #roll-btn { background: #ff4b2b; color: white; border: none; padding: 18px; width: 100%; font-weight: 900; border-radius: 16px; cursor: pointer; text-transform: uppercase; font-size: 16px; box-shadow: 0 5px 15px rgba(255, 75, 43, 0.3); }
        #roll-btn:disabled { opacity: 0.5; }

        .info-box { font-size: 14px; margin-bottom: 10px; opacity: 0.8; margin-top: 20px; }
        select { background: #0b101b; color: #ffd700; border: 1px solid #2a3454; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 15px; outline: none; }
        
        .multiplier-info { font-size: 11px; opacity: 0.6; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="main">
        <a href="index.html" class="back-link">← НАЗАД</a>
        <a href="withdraw.html" class="withdraw-link">💳 ВИВІД</a>
        
        <div id="ton-connect" style="display: flex; justify-content: center; margin-bottom: 15px; margin-top: 20px;"></div>
        
        <div class="title-dice">UA DICE</div>
        <div class="info-box">Баланс: <span id="user-balance" style="color:#ffd700">...</span> UA</div>

        <div class="dice-container">
            <div id="dice">🎲</div>
        </div>

        <select id="bet-amount">
            <option value="0.01">СТАВКА: 0.01 TON</option>
            <option value="0.02">СТАВКА: 0.02 TON</option>
        </select>

        <button id="roll-btn" onclick="rollDice()">КИНУТИ КУБИК</button>

        <div class="multiplier-info">
            1-2: 0 UA | 3: x1.5 | 4: x2 | 5: x3 | 6: x5
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let userName = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? (tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name) : "Гравець";
        let balance = 0;
        let isRolling = false;

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/Uasprint/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        const firebaseConfig = { 
            apiKey: "AIzaSyAYt_bjoLkBBE6LRTKgvbncm_O-rM_K16o", 
            authDomain: "ualottery.firebaseapp.com", 
            projectId: "ualottery", 
            appId: "1:960757780790:web:568c021958b4ec8f0d8bd6" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

        async function loadData() {
            const doc = await db.collection('users').doc(userName).get();
            balance = doc.exists ? doc.data().amount : 0;
            document.getElementById('user-balance').innerText = balance.toLocaleString();
        }

        async function rollDice() {
            if (!tonConnectUI.connected || isRolling) return alert("Підключіть гаманець!");
            const bet = parseFloat(document.getElementById('bet-amount').value);

            try {
                await tonConnectUI.sendTransaction({
                    validUntil: Math.floor(Date.now() / 1000) + 300,
                    messages: [{ address: "EQBrD-UZ8w2tAyxCNjO8lF4ioTwI-ELiQgF7kclC7gM2UOO_", amount: (bet * 1000000000).toString() }]
                });

                const statsRef = db.collection('stats').doc('global');
                db.runTransaction(async (t) => {
                    const d = await t.get(statsRef);
                    t.set(statsRef, { totalIn: (d.exists ? d.data().totalIn || 0 : 0) + bet }, { merge: true });
                });

                startRoll(bet);
            } catch (e) { console.error(e); }
        }

        function startRoll(bet) {
            isRolling = true;
            document.getElementById('roll-btn').disabled = true;
            const diceEl = document.getElementById('dice');
            diceEl.classList.add('roll-anim');

            setTimeout(async () => {
                diceEl.classList.remove('roll-anim');
                const result = Math.floor(Math.random() * 6) + 1; // 1 to 6
                diceEl.innerText = diceFaces[result - 1];

                let winUA = 0;
                let baseUA = bet === 0.01 ? 100 : 220;

                if (result === 3) winUA = Math.floor(baseUA * 1.5);
                else if (result === 4) winUA = baseUA * 2;
                else if (result === 5) winUA = baseUA * 3;
                else if (result === 6) winUA = baseUA * 5;

                if (winUA > 0) {
                    balance += winUA;
                    await db.collection('users').doc(userName).set({ amount: balance }, { merge: true });
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                    tg.showAlert(`Випало ${result}! Ви виграли ${winUA} UA!`);
                } else {
                    tg.showAlert(`Випало ${result}. Не пощастило, спробуйте ще!`);
                }

                isRolling = false;
                document.getElementById('roll-btn').disabled = false;
                loadData();
            }, 1500);
        }

        loadData();
    </script>
</body>
</html>
