<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA WITHDRAW - ПІДТВЕРДЖЕННЯ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { background: #0b101b; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; min-height: 100vh; }
        .main { background: linear-gradient(145deg, #151b2b, #1e263d); padding: 30px; border-radius: 24px; width: 100%; max-width: 380px; border: 1px solid #2a3454; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); align-self: center; }
        .icon { font-size: 60px; margin-bottom: 20px; display: block; }
        h2 { color: #ffd700; margin-bottom: 15px; font-size: 22px; }
        p { opacity: 0.8; font-size: 15px; line-height: 1.6; margin-bottom: 25px; }
        .btn-send { 
            display: inline-block; 
            background: linear-gradient(90deg, #ffd700, #ff8800); 
            color: #000; 
            text-decoration: none; 
            padding: 18px 20px; 
            border-radius: 16px; 
            font-weight: 900; 
            text-transform: uppercase; 
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
            cursor: pointer;
            border: none;
        }
        .btn-back { display: block; margin-top: 20px; color: #ffd700; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="main">
        <div id="status-ui">
            <span class="icon" id="status-icon">⏳</span>
            <h2 id="status-title">ОБРОБКА...</h2>
            <p id="status-desc">Перевіряємо дані вашого балансу.</p>
            <button id="action-btn" class="btn-send" style="display: none;" onclick="handleWithdrawClick()">ВІДПРАВИТИ ЗАЯВКУ</button>
            <a href="index.html" class="btn-back">НАЗАД В ХАБ</a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let userName = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? (tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name) : "User";
        
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/Uasprint/tonconnect-manifest.json'
        });

        const firebaseConfig = { 
            apiKey: "AIzaSyAYt_bjoLkBBE6LRTKgvbncm_O-rM_K16o", 
            authDomain: "ualottery.firebaseapp.com", 
            projectId: "ualottery", 
            appId: "1:960757780790:web:568c021958b4ec8f0d8bd6" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let finalLink = "";
        let withdrawAmount = 0;

        async function process() {
            try {
                const userRef = db.collection('users').doc(userName);
                const doc = await userRef.get();

                if (doc.exists) {
                    withdrawAmount = doc.data().amount || 0;
                    const wallet = tonConnectUI.account ? tonConnectUI.account.address : "Гаманець не підключено";

                    if (withdrawAmount >= 20000) {
                        const messageText = `🚀 ЗАЯВКА НА ВИПЛАТУ\n` +
                                          `-------------------\n` +
                                          `👤 Гравець: @${userName}\n` +
                                          `💰 Сума: ${withdrawAmount.toLocaleString()} UA\n` +
                                          `💳 Гаманець: ${wallet}\n` +
                                          `🎮 Проект: UA GOLDEN HUB`;

                        finalLink = `https://t.me/tokenpist_bot?text=${encodeURIComponent(messageText)}`;

                        // Показуємо кнопку
                        document.getElementById('status-icon').innerText = "🏦";
                        document.getElementById('status-title').innerText = "ПЕРЕВІРКА УСПІШНА";
                        document.getElementById('status-desc').innerHTML = `Ви готові вивести <b>${withdrawAmount.toLocaleString()} UA</b>. Після натискання ваш баланс буде списано, а статистика проекту оновлена.`;
                        
                        document.getElementById('action-btn').style.display = "block";
                    } else {
                        document.getElementById('status-icon').innerText = "❌";
                        document.getElementById('status-title').innerText = "МАЛО UA";
                        document.getElementById('status-desc').innerText = "Мінімальний вивід від 20,000 UA.";
                        const btn = document.getElementById('action-btn');
                        btn.innerText = "ГРАТИ ЩЕ";
                        btn.onclick = () => { window.location.href = "index.html"; };
                        btn.style.display = "block";
                    }
                }
            } catch (e) { console.error(e); }
        }

        async function handleWithdrawClick() {
            if (finalLink && withdrawAmount > 0) {
                try {
                    const userRef = db.collection('users').doc(userName);
                    const globalStatsRef = db.collection('stats').doc('global');

                    // 1. Обнуляємо баланс гравця
                    await userRef.update({ amount: 0 });

                    // 2. Додаємо суму до загальних виплат проекту (лічильник на головній)
                    await globalStatsRef.update({
                        totalOut: firebase.firestore.FieldValue.increment(withdrawAmount)
                    });

                    // 3. Відкриваємо бота
                    window.open(finalLink, '_blank');
                    
                    // 4. Повертаємо в хаб через секунду
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1000);
                } catch (err) {
                    console.error("Помилка при оновленні статистики:", err);
                }
            }
        }

        setTimeout(process, 1000);
    </script>
</body>
</html>
