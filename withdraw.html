<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA WITHDRAW - ВИВІД КОШТІВ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { background: #0b101b; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; min-height: 100vh; }
        .main { background: linear-gradient(145deg, #151b2b, #1e263d); padding: 30px; border-radius: 24px; width: 100%; max-width: 380px; border: 1px solid #2a3454; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); align-self: center; }
        
        .icon { font-size: 60px; margin-bottom: 20px; display: block; }
        h2 { color: #ffd700; margin-bottom: 15px; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        p { opacity: 0.8; font-size: 15px; line-height: 1.6; margin-bottom: 25px; }

        .btn-send { 
            display: inline-block; 
            background: linear-gradient(90deg, #ffd700, #ff8800); 
            color: #000; 
            text-decoration: none; 
            padding: 18px 20px; 
            border-radius: 16px; 
            font-weight: 900; 
            text-transform: uppercase; 
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
            transition: 0.2s;
        }
        .btn-send:active { transform: scale(0.97); }

        .btn-back { display: block; margin-top: 20px; color: #ffd700; text-decoration: none; font-size: 13px; font-weight: bold; opacity: 0.6; }
        
        #loading-bar { width: 100%; height: 4px; background: #1a2235; border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
        #loading-fill { width: 30%; height: 100%; background: #ffd700; animation: load 1.5s infinite linear; }
        @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(300%); } }
    </style>
</head>
<body>
    <div class="main">
        <div id="status-ui">
            <span class="icon" id="status-icon">⏳</span>
            <div id="loading-bar"><div id="loading-fill"></div></div>
            <h2 id="status-title">ПЕРЕВІРКА...</h2>
            <p id="status-desc">Синхронізуємо дані з вашим гаманцем та базою UA GOLDEN HUB.</p>
            
            <a id="action-btn" href="#" class="btn-send" style="display: none;">ВІДПРАВИТИ ЗАЯВКУ</a>
            <a href="index.html" class="btn-back" id="back-link">ПОВЕРНУТИСЯ В ХАБ</a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let userName = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? (tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name) : "Гравець";
        
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/Uasprint/tonconnect-manifest.json'
        });

        const firebaseConfig = { 
            apiKey: "AIzaSyAYt_bjoLkBBE6LRTKgvbncm_O-rM_K16o", 
            authDomain: "ualottery.firebaseapp.com", 
            projectId: "ualottery", 
            appId: "1:960757780790:web:568c021958b4ec8f0d8bd6" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function processWithdraw() {
            try {
                const userRef = db.collection('users').doc(userName);
                const doc = await userRef.get();

                if (doc.exists) {
                    const amount = doc.data().amount || 0;
                    const wallet = tonConnectUI.account ? tonConnectUI.account.address : "Гаманець не підключено";
                    const MIN_LIMIT = 20000;

                    document.getElementById('loading-bar').style.display = "none";

                    if (amount >= MIN_LIMIT) {
                        // Текст для бота
                        const messageText = `🚀 НОВА ЗАЯВКА НА ВИПЛАТУ\n` +
                                          `---------------------------\n` +
                                          `👤 Гравець: @${userName}\n` +
                                          `💰 Сума: ${amount.toLocaleString()} UA\n` +
                                          `💳 Гаманець: ${wallet}\n` +
                                          `🎮 Проект: UA GOLDEN HUB`;

                        const encodedMsg = encodeURIComponent(messageText);
                        const botLink = `https://t.me/tokenpist_bot?text=${encodedMsg}`;

                        // ОБНУЛЯЄМО БАЛАНС ПЕРЕД ВИВОДОМ
                        await userRef.update({ amount: 0 });

                        // Оновлення інтерфейсу на "Успіх"
                        document.getElementById('status-icon').innerText = "🏦";
                        document.getElementById('status-title').innerText = "БАЛАНС ПЕРЕВІРЕНО";
                        document.getElementById('status-desc').innerHTML = `Суму <b>${amount.toLocaleString()} UA</b> зарезервовано для виплати. <br><br>Натисніть кнопку нижче, щоб надіслати дані адміністратору в бот.`;
                        
                        const btn = document.getElementById('action-btn');
                        btn.href = botLink;
                        btn.style.display = "block";
                        document.getElementById('back-link').style.display = "none";
                    } else {
                        // Якщо грошей замало
                        document.getElementById('status-icon').innerText = "❌";
                        document.getElementById('status-title').innerText = "НЕДОСТАТНЬО UA";
                        document.getElementById('status-desc').innerText = `Мінімальний поріг виводу: ${MIN_LIMIT.toLocaleString()} UA. На вашому балансі лише ${amount.toLocaleString()} UA. Продовжуйте перемагати в іграх!`;
                        
                        const btn = document.getElementById('action-btn');
                        btn.innerText = "ГРАТИ ЩЕ";
                        btn.href = "index.html";
                        btn.style.display = "block";
                        btn.style.background = "linear-gradient(90deg, #333, #555)";
                        btn.style.color = "white";
                    }
                }
            } catch (e) {
                console.error(e);
                document.getElementById('status-title').innerText = "ПОМИЛКА";
                document.getElementById('status-desc').innerText = "Помилка зв'язку з сервером. Спробуйте пізніше.";
            }
        }

        // Чекаємо трохи, щоб TON Connect встиг ініціалізуватися
        setTimeout(processWithdraw, 1500);
    </script>
</body>
</html>
