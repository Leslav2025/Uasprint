<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA WHEEL - КОЛЕСО</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #0b101b; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; min-height: 100vh; }
        .main { background: linear-gradient(145deg, #151b2b, #1e263d); padding: 25px; border-radius: 24px; width: 100%; max-width: 380px; border: 1px solid #2a3454; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); position: relative; }
        
        /* Навігація */
        .back-link { position: absolute; top: 15px; left: 20px; color: #ffd700; text-decoration: none; font-size: 12px; font-weight: bold; z-index: 10; }
        .withdraw-link { position: absolute; top: 15px; right: 20px; color: #ffd700; text-decoration: none; font-size: 12px; font-weight: bold; border: 1px solid #ffd700; padding: 4px 8px; border-radius: 8px; z-index: 10; }
        
        .title-wheel { font-size: 26px; font-weight: 900; margin: 30px 0 5px 0; background: linear-gradient(90deg, #ffd700, #ff8800); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* КОЛЕСО */
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #2a3454; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 30px; height: 40px; background: #ffd700; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; filter: drop-shadow(0 2px 5px black); }

        #spin-btn { background: linear-gradient(90deg, #ffd700, #ff8800); color: #000; border: none; padding: 18px; width: 100%; font-weight: 900; border-radius: 16px; cursor: pointer; text-transform: uppercase; font-size: 16px; margin-top: 20px; }
        #spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .result-display { margin-top: 15px; font-size: 18px; font-weight: bold; color: #ffd700; min-height: 24px; }
        select { background: #0b101b; color: #ffd700; border: 1px solid #2a3454; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 15px; outline: none; }
    </style>
</head>
<body>
    <div class="main">
        <a href="index.html" class="back-link">← НАЗАД</a>
        <a href="withdraw.html" class="withdraw-link">💳 ВИВІД</a>
        
        <div id="ton-connect" style="display: flex; justify-content: center; margin-bottom: 15px; margin-top: 20px;"></div>
        
        <div class="title-wheel">UA WHEEL</div>
        <div style="font-size: 14px; opacity: 0.8;">Баланс: <span id="user-balance" style="color:#ffd700">...</span> UA</div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel"></canvas>
        </div>

        <div class="result-display" id="result-text">10 СЕКТОРІВ — УДАЧІ!</div>

        <select id="bet-amount">
            <option value="0.01">СТАВКА: 0.01 TON</option>
            <option value="0.02">СТАВКА: 0.02 TON</option>
        </select>

        <button id="spin-btn" onclick="playWheel()">КРУТИТИ КОЛЕСО</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let userName = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? (tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name) : "Гравець";
        let balance = 0;
        let isSpinning = false;

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/Uasprint/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        const firebaseConfig = { 
            apiKey: "AIzaSyAYt_bjoLkBBE6LRTKgvbncm_O-rM_K16o", 
            authDomain: "ualottery.firebaseapp.com", 
            projectId: "ualottery", 
            appId: "1:960757780790:web:568c021958b4ec8f0d8bd6" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 10 секторів (3 нулі)
        const sectors = [
            { label: "0", color: "#1a2235", win: 0 },
            { label: "200", color: "#ff8800", win: 200 },
            { label: "0", color: "#1a2235", win: 0 },
            { label: "500", color: "#4caf50", win: 500 },
            { label: "100", color: "#0057b7", win: 100 },
            { label: "0", color: "#1a2235", win: 0 },
            { label: "300", color: "#ffd700", win: 300 },
            { label: "800", color: "#9c27b0", win: 800 },
            { label: "150", color: "#ff4b2b", win: 150 },
            { label: "JACK", color: "#ff416c", win: 3000 }
        ];

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        canvas.width = 280; canvas.height = 280;

        function drawWheel() {
            const arc = (Math.PI * 2) / sectors.length;
            sectors.forEach((s, i) => {
                const angle = i * arc;
                ctx.fillStyle = s.color;
                ctx.beginPath(); ctx.moveTo(140, 140);
                ctx.arc(140, 140, 140, angle, angle + arc);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.stroke();
                
                ctx.save();
                ctx.translate(140 + Math.cos(angle + arc/2) * 100, 140 + Math.sin(angle + arc/2) * 100);
                ctx.rotate(angle + arc/2 + Math.PI/2);
                ctx.fillStyle = "white"; ctx.font = "bold 14px Arial";
                ctx.fillText(s.label, -ctx.measureText(s.label).width/2, 0);
                ctx.restore();
            });
        }
        drawWheel();

        async function loadData() {
            const doc = await db.collection('users').doc(userName).get();
            balance = doc.exists ? doc.data().amount : 0;
            document.getElementById('user-balance').innerText = balance.toLocaleString();
        }

        async function playWheel() {
            if (!tonConnectUI.connected || isSpinning) return alert("Підключіть гаманець!");
            const bet = parseFloat(document.getElementById('bet-amount').value);

            try {
                await tonConnectUI.sendTransaction({
                    validUntil: Math.floor(Date.now() / 1000) + 300,
                    messages: [{ address: "EQBrD-UZ8w2tAyxCNjO8lF4ioTwI-ELiQgF7kclC7gM2UOO_", amount: (bet * 1000000000).toString() }]
                });

                const statsRef = db.collection('stats').doc('global');
                db.runTransaction(async (t) => {
                    const d = await t.get(statsRef);
                    t.set(statsRef, { totalIn: (d.exists ? d.data().totalIn || 0 : 0) + bet }, { merge: true });
                });

                isSpinning = true;
                document.getElementById('spin-btn').disabled = true;
                document.getElementById('result-text').innerText = "Удачі...";
                
                const randomSector = Math.floor(Math.random() * sectors.length);
                const rotation = (360 * 5) + (randomSector * (360 / sectors.length));
                
                canvas.style.transform = `rotate(-${rotation}deg)`;

                setTimeout(async () => {
                    // Вираховуємо реальний індекс після зупинки (враховуючи зміщення Canvas)
                    const actualIndex = (sectors.length - (randomSector % sectors.length)) % sectors.length;
                    const prize = sectors[actualIndex].win * (bet === 0.02 ? 2.5 : 1); // Бонус x2.5 за ставку 0.02

                    if (prize > 0) {
                        balance += prize;
                        document.getElementById('result-text').innerText = `🎉 ВИГРАШ: ${prize} UA!`;
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                        await db.collection('users').doc(userName).set({ amount: balance }, { merge: true });
                    } else {
                        document.getElementById('result-text').innerText = "Зовсім поруч! ☘️";
                    }
                    isSpinning = false;
                    document.getElementById('spin-btn').disabled = false;
                    loadData();
                }, 4000);

            } catch (e) { console.error(e); }
        }
        loadData();
    </script>
</body>
</html>
