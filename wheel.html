<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA WHEEL - КОЛЕСО</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { background: #0b101b; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; min-height: 100vh; }
        .main { background: linear-gradient(145deg, #151b2b, #1e263d); padding: 25px; border-radius: 24px; width: 100%; max-width: 380px; border: 1px solid #2a3454; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); position: relative; }
        
        .nav-links { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .nav-btn { color: #ffd700; text-decoration: none; font-size: 12px; font-weight: bold; border: 1px solid #ffd700; padding: 5px 10px; border-radius: 8px; }
        
        .title-wheel { font-size: 26px; font-weight: 900; margin: 10px 0 5px 0; background: linear-gradient(90deg, #ffd700, #ff8800); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .balance-box { background: rgba(255,215,0,0.1); padding: 12px; border-radius: 15px; border: 1px solid #ffd700; margin: 15px 0; font-size: 22px; color: #ffd700; font-weight: bold; }
        
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 20px auto; display: flex; justify-content: center; align-items: center; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #2a3454; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 30px; height: 40px; background: #ffd700; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 15; filter: drop-shadow(0 2px 5px black); }

        #spin-btn { background: linear-gradient(90deg, #ffd700, #ff8800); color: #000; border: none; padding: 18px; width: 100%; font-weight: 900; border-radius: 16px; cursor: pointer; text-transform: uppercase; font-size: 16px; margin-top: 10px; }
        #spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .result-display { margin-top: 15px; font-size: 18px; font-weight: bold; color: #ffd700; min-height: 24px; }
        select { background: #1a2235; color: white; border: 1px solid #2a3454; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 10px; outline: none; }
        .btn-deposit { background: transparent; color: #4caf50; border: 1px solid #4caf50; font-size: 11px; margin-top: 15px; padding: 10px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="main">
        <div class="nav-links">
            <a href="index.html" class="nav-btn">← ХАБ</a>
            <a href="withdraw.html" class="nav-btn">ВИВІД 💳</a>
        </div>
        
        <div id="ton-connect" style="display: flex; justify-content: center; margin-bottom: 10px;"></div>
        
        <div class="title-wheel">UA WHEEL</div>
        <div class="balance-box"><span id="user-balance">0</span> UA</div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel"></canvas>
        </div>

        <div class="result-display" id="result-text">УДАЧІ!</div>

        <select id="bet-amount">
            <option value="100">СТАВКА: 100 UA</option>
            <option value="200">СТАВКА: 200 UA</option>
            <option value="500">СТАВКА: 500 UA</option>
        </select>

        <button id="spin-btn" onclick="playWheel()">КРУТИТИ КОЛЕСО</button>
        
        <button class="btn-deposit" onclick="buyUA()">➕ КУПИТИ 5000 UA (0.01 TON)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let userName = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? (tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name) : "Гравець";
        let balance = 0;
        let isSpinning = false;
        let currentRotation = 0;

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/Uasprint/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        const firebaseConfig = { 
            apiKey: "AIzaSyAYt_bjoLkBBE6LRTKgvbncm_O-rM_K16o", 
            authDomain: "ualottery.firebaseapp.com", 
            projectId: "ualottery", 
            appId: "1:960757780790:web:568c021958b4ec8f0d8bd6" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const sectors = [
            { label: "x0", color: "#1a2235", mult: 0 },
            { label: "x2", color: "#ff8800", mult: 2 },
            { label: "x0", color: "#1a2235", mult: 0 },
            { label: "x5", color: "#4caf50", mult: 5 },
            { label: "x1.5", color: "#0057b7", mult: 1.5 },
            { label: "x0", color: "#1a2235", mult: 0 },
            { label: "x3", color: "#ffd700", mult: 3 },
            { label: "x8", color: "#9c27b0", mult: 8 },
            { label: "x0.5", color: "#ff4b2b", mult: 0.5 },
            { label: "JACK", color: "#ff416c", mult: 20 }
        ];

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        canvas.width = 280; canvas.height = 280;

        function drawWheel() {
            const arc = (Math.PI * 2) / sectors.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            sectors.forEach((s, i) => {
                const angle = i * arc;
                ctx.fillStyle = s.color;
                ctx.beginPath();
                ctx.moveTo(140, 140);
                ctx.arc(140, 140, 135, angle, angle + arc);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.stroke();
                
                ctx.save();
                ctx.translate(140, 140);
                ctx.rotate(angle + arc / 2);
                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";
                ctx.textAlign = "right";
                ctx.fillText(s.label, 125, 5);
                ctx.restore();
            });
        }

        drawWheel();

        async function loadData() {
            const doc = await db.collection('users').doc(userName).get();
            balance = doc.exists ? (doc.data().amount || 0) : 0;
            document.getElementById('user-balance').innerText = balance.toLocaleString();
        }

        async function playWheel() {
            if (isSpinning) return;
            const bet = parseInt(document.getElementById('bet-amount').value);
            
            if (balance < bet) return tg.showAlert("Мало UA на балансі!");

            // Списуємо ставку
            balance -= bet;
            await db.collection('users').doc(userName).set({ amount: balance }, { merge: true });
            document.getElementById('user-balance').innerText = balance.toLocaleString();

            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('result-text').innerText = "Крутимо...";
            
            const randomSectorIndex = Math.floor(Math.random() * sectors.length);
            const sectorDegrees = 360 / sectors.length;
            
            const stopAngle = (randomSectorIndex * sectorDegrees);
            currentRotation += (360 * 5) + (360 - stopAngle); 
            
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(async () => {
                const win = Math.floor(bet * sectors[randomSectorIndex].mult);

                if (win > 0) {
                    balance += win;
                    document.getElementById('result-text').innerText = `🎉 +${win} UA!`;
                    document.getElementById('result-text').style.color = "#4caf50";
                    await db.collection('users').doc(userName).set({ amount: balance }, { merge: true });
                } else {
                    document.getElementById('result-text').innerText = "0 UA - Спробуйте ще! ☘️";
                    document.getElementById('result-text').style.color = "#ff4b2b";
                }
                
                isSpinning = false;
                document.getElementById('spin-btn').disabled = false;
                loadData();
            }, 4100);
        }

        async function buyUA() {
            if(!tonConnectUI.connected) return tg.showAlert("Підключіть гаманець!");
            try {
                const result = await tonConnectUI.sendTransaction({
                    validUntil: Math.floor(Date.now() / 1000) + 300,
                    messages: [{ address: "EQBrD-UZ8w2tAyxCNjO8lF4ioTwI-ELiQgF7kclC7gM2UOO_", amount: "10000000" }]
                });
                if(result) {
                    balance += 5000;
                    await db.collection('users').doc(userName).set({ amount: balance }, { merge: true });
                    
                    const statsRef = db.collection('stats').doc('global');
                    db.runTransaction(async (t) => {
                        const d = await t.get(statsRef);
                        t.set(statsRef, { totalIn: (d.exists ? d.data().totalIn || 0 : 0) + 0.01 }, { merge: true });
                    });
                    
                    loadData();
                    tg.showAlert("✅ Нараховано 5000 UA!");
                }
            } catch(e) { console.error(e); }
        }
        
        loadData();
    </script>
</body>
</html>
